<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Tritium</title>
    <meta http-equiv="CACHE-CONTROL" content="NO-CACHE" />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/material-darker.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/hint/show-hint.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <div class="top-bar">
    <div class="top-bar-title">Tritium</div>
  </div>
  <body>
    
    <div class="container">
      <div class="tabs-bar">
        <div class="tabs" id="tabs"></div>
        <button id="new-tab-btn" class="tab add-tab-btn" title="New Tab"><i class="fas fa-plus"></i></button>
      </div>
      <div class="editor-container" id="editor-container">
        <div class="tooltip" id="tooltip"></div>
      </div>
      <div class="console-container">
        <div class="console-header">
          <span><i class="fas fa-terminal"></i> Console</span>
          <div style="display: flex; gap: 8px;">
            <button class="console-btn" id="copyConsole" title="Copy Console"><i class="fas fa-copy"></i></button>
            <button class="console-btn" id="clearConsole" title="Clear Console"><i class="fas fa-trash"></i></button>
          </div>
        </div>
        <div class="console-output" id="consoleOutput"></div>
      </div>
      <footer>
        <button id="save-button" class="button save-button" title="Save"><i class="fas fa-save"></i></button>
        <button id="settings-button" class="button settings-button" title="Settings"><i class="fas fa-cog"></i></button>
        <div style="flex:1; display:flex; justify-content:center; align-items:center;">
          <button id="roblox-button" class="button roblox-button">Launch Roblox<i></i></button>
        </div>
        <button id="exec-button" class="exec-button"> <i class="fas fa-play"></i></button>
      </footer>
    </div>
    <div class="sidebar" id="sidebar"><input type="text" id="searchBox" placeholder="Search scripts..." />
      <div class="scripts" id="scripts"></div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="context-menu" id="contextMenu">
      <div class="context-menu-item" id="renameScript">Rename</div>
      <div class="context-menu-item" id="deleteScript">Delete</div>
      <div class="context-menu-separator"></div>
      <div class="context-menu-item" id="autoExecuteScript">AutoExecute <span class="context-menu-checkbox" id="autoExecuteCheckbox">✓</span></div>
    </div>
    <div class="settings-pane" id="settingsPane">
      <div class="settings-content">
        <h2>Settings</h2>
        <div class="settings-group">
          <label for="glowMode">Glow Mode</label>
          <select id="glowMode">
            <option value="none">none</option>
            <option value="default">default</option>
            <option value="high">drugs</option>
          </select>
          <button class="reset-btn" id="resetGlow">Reset</button>
        </div>
        <div class="settings-group">
          <label for="accentColorInput">Accent Color</label>
          <div class="accent-color-picker-wrapper">
            <input id="accentColorInput" type="text" maxlength="6" placeholder="7FB4FF" class="accent-color-input" />
            <span id="accentColorPreview" class="accent-color-preview"></span>
          </div>
          <button class="reset-btn" id="resetColor">Reset</button>
        </div>
        <div class="settings-actions">
          <button id="closeSettings" class="button">Close</button>
        </div>
      </div>
    </div>
    <div class="rename-dialog" id="renameDialog">
      <div class="rename-content">
        <h2>Rename before saving</h2>
        <input type="text" id="renameInput" placeholder="enter script name" />
        <div class="rename-buttons">
          <button id="confirmRename" class="button">Save</button>
          <button id="cancelRename" class="button">Cancel</button>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/lua/lua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/hint/show-hint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/hint/anyword-hint.min.js"></script>
    <script src="main.js"></script>
  </body>
</html>
